##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules


windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run

    move = 20 monitor_h-120
    float = on
}

windowrule {
    name = zen-save-as
    match:class = ^(.*zen.*)$
    match:title = ^(.*Save As.*)$

    animation = slide left
}

windowrule {
    name = pwvucontrol
    match:class = ^(com.saivert.pwvucontrol)$

    float = on
    size = 820 370    
    move = 1093 40
}

windowrule {
    name = mission-center
    match:class = ^(io.missioncenter.MissionCenter)$

    float = on
    center = on
}

windowrule {
    name = google-account-web
    match:title = ^(.*Вхід – облікові записи Google.*)$

    float = on
    center = on
    size = 850 940
}

windowrule {
    name = bluetuith
    match:class = ^(bluetuith)$

    float = on
    size = 820 355    
    move = 1093 40
}

windowrule {
    name = overskride
    match:title = ^(overskride)$

    float = on
    size = 980 690    
    move = 920 40
}

windowrule {
    name = calendar
    match:class = ^(calendar)$

    float = on
    size = 1310 725    
    move = 305 40
}

windowrule {
    name = btop
    match:class = ^(btop)$

    float = on
    maximize = on
    center = on
}

windowrule {
    name = updates-to-install
    match:class = ^(updates_install)$

    float = on
    size = 1110 690
}

windowrule {
    name = heroic-launcher
    match:class = ^(heroic)$

    workspace = 5
}

windowrule {
    name = blender-launcher
    match:class = ^(blenderlauncher)$

    float = on
    size = 640 480    
    move = 640 250
}

windowrule {
    name = blender
    match:class = ^(blender)$

    float = on
    maximize = on
}

windowrule {
    name = qalculate
    match:class = ^(Qalculate)$

    float = on
    center = on
}

windowrule {
    name = zotero-citations-progress
    match:class = ^(Zotero)$
    match:title = ^(Quick Format Citation|Progress)$

    float = on
    center = on
    size = 800 800
    max_size = 800 35
}

windowrule {
    name = zotero-citations-add
    match:class = ^(Zotero)$
    match:title = ^(Add/Edit Citation)$

    float = on
    center = on
    size = 900 400
}

windowrule {
    name = zotero-citations-settings
    match:class = ^(Zotero)$
    match:title = ^(Zotero Settings)$

    float = on
    center = on
    size = 1090 650
}

windowrule {
    name = virualbox-settings 
    match:class = ^(VirtualBox)$
    match:title = ^(.*Settings)$

    float = on
    center = on
    no_blur = on
}

windowrule {
    name = bar
    match:class = ^(Beyond-All-Reason)$

    float = on
    center = on
    workspace = 6 silent
}

windowrule = match:class ^(spring)$, match:title ^(Beyond All Reason)$, workspace 6 silent

windowrule {
    name = copyq 
    match:class = ^(.*com.github.hluk.copyq.*)$

    float = on
    size = 1020 720
    move = 155 40
}

windowrule = match:class (org.telegram.desktop), workspace 5 silent 
windowrule = match:class (discord), workspace 7 silent
windowrule = match:class (Spotify), workspace 7 silent
windowrule = match:class (steam), workspace 6 silent
windowrule = match:class ^(.*epicgameslauncher.exe.*)$, match:title ^(.*Epic Games Launcher.*)$, workspace 6 silent
windowrule = match:class ^(.*net.lutris.Lutris.*)$, workspace 6 silent

windowrule {
    name = file-manager-from-some-script
    match:class = ^file-manager$

    float = on
    center = on
    size = 1800 900
}

windowrule {
    name = qView
    match:class = ^.*com.interversehq.qView.*$

    float = on
    center = on
    size = 1170 880
}

windowrule {
    name = xdg-save-path
    match:title = ^.*Choose save path.*$

    float = on
    center = on
    size = 1140 650
    animation = slide left
}

windowrule {
    name = xdg-desktop-portal
    match:class = ^(xdg-desktop-portal)$
    match:title = ^.*(Open|Save).*$

    float = on
    center = on
    size = 1140 650
    animation = slide left
}

windowrule {
    name = fileroller-extract
    match:class = ^(org.gnome.FileRoller)$
    match:title = ^(.*.*Extract.*)$

    center = on
}

windowrule {
    name = naps2-scanner-main
    match:class = ^(naps2)$
    match:title = ^$

    float = on
    center = on
    size = 1140 650
    animation = slide left
}

windowrule {
    name = naps2-scanner
    match:class = ^(naps2)$
    match:title = ^(.*\([^)]*\).*)$

    float = on
    center = on
    size = 450 100
}

windowrule {
    name = xwayland-videobridge
    match:class = ^(xwaylandvideobridge)$

    opacity = 0.0
    no_anim = on
    no_initial_focus = on
    max_size = 1 1
    no_blur = on
    no_focus = on
}
